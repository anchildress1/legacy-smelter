name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && !startsWith(github.ref_name, 'dependabot/')
    steps:
      # Pinned to the commit SHA backing v4.4.0 per SonarQube S7637 and
      # GitHub's hardening guidance for third-party actions. Update this
      # SHA + comment in lockstep when bumping the version.
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
