    <!-- Fonts — preconnect eliminates DNS+TLS round-trips; the stylesheet

    <!-- SRI (integrity=) omitted: Google Fonts returns different CSS per user-agent, so a fixed hash would break. -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" />
