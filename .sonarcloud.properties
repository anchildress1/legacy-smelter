# SonarCloud configuration for Legacy Smelter.
#
# SonarCloud automatically picks up TypeScript/JavaScript sources from the
# repo root without explicit sonar.sources, so the default template entries
# below are left commented. Uncomment and customize if/when the project
# outgrows auto-detection (e.g. when tests live in a non-standard location
# or a generated directory needs to be excluded from analysis).

# Path to sources
#sonar.sources=.
#sonar.exclusions=
#sonar.inclusions=

# Path to tests
#sonar.tests=
#sonar.test.exclusions=
#sonar.test.inclusions=

# Source encoding
#sonar.sourceEncoding=UTF-8

# Exclusions for copy-paste detection
#sonar.cpd.exclusions=
